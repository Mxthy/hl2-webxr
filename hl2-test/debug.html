<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>HL2 WebXR Debug</title>
<style>
body { background:#111; color:#0f0; font-family:monospace; margin:0; padding:10px; }
#log { height:250px; overflow-y:auto; border:1px solid #0f0; padding:8px; font-size:12px; margin-bottom:8px; }
#progress { width:100%; margin-bottom:8px; }
#canvas-wrap { border:2px solid #f80; display:inline-block; }
canvas { display:block; }
.err { color:#f44; }
.warn { color:#fa0; }
.info { color:#4af; }
</style>
</head>
<body>
<h2 style="color:#f80;margin:0 0 6px">HL2 WebXR — Build #55 Debug</h2>
<div id="log"></div>
<span id="spinner" style="display:none">&#8987; </span>
<span id="status-text"></span>
<progress id="progress" value="0" max="1" hidden></progress>
<div id="canvas-wrap">
  <canvas id="canvas" width="1280" height="720"></canvas>
</div>

<script>
const log = document.getElementById('log');
function addLog(msg, cls) {
  cls = cls || '';
  const d = document.createElement('div');
  d.className = cls;
  d.textContent = '[' + new Date().toISOString().substr(11,12) + '] ' + msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}

['log','warn','error','info'].forEach(function(m) {
  const orig = console[m];
  console[m] = function() {
    orig.apply(console, arguments);
    const args = Array.prototype.slice.call(arguments);
    const cls = m === 'error' ? 'err' : m === 'warn' ? 'warn' : m === 'info' ? 'info' : '';
    addLog('[' + m.toUpperCase() + '] ' + args.map(function(a){ return typeof a === 'object' ? JSON.stringify(a) : String(a); }).join(' '), cls);
  };
});

window.onerror = function(msg, src, line, col, err) {
  addLog('UNCAUGHT: ' + msg + ' @ ' + src + ':' + line + ':' + col, 'err');
  return false;
};
window.onunhandledrejection = function(e) {
  addLog('PROMISE REJECT: ' + e.reason, 'err');
};

window.canvasElement  = document.getElementById('canvas');
window.statusElement  = document.getElementById('status-text');
window.spinnerElement = document.getElementById('spinner');
window.progressElement = document.getElementById('progress');

addLog('SAB: ' + (typeof SharedArrayBuffer !== 'undefined' ? 'OK' : 'MISSING'), 'info');
addLog('WebGL2: ' + (!!document.createElement('canvas').getContext('webgl2') ? 'OK' : 'MISSING'), 'info');
addLog('crossOriginIsolated: ' + window.crossOriginIsolated, 'info');

async function fetchInChunks(url, chunkSize) {
  // First get total size via HEAD request
  const head = await fetch(url, {method:'HEAD'});
  const totalSize = parseInt(head.headers.get('content-length'));
  addLog(`Fetching ${url} (${(totalSize/1024/1024).toFixed(0)}MB) in chunks...`, 'info');
  const chunks = [];
  let loaded = 0;
  for (let start = 0; start < totalSize; start += chunkSize) {
    const end = Math.min(start + chunkSize - 1, totalSize - 1);
    addLog(`  Chunk ${Math.floor(start/chunkSize)+1}: bytes ${start}-${end}`, 'info');
    const resp = await fetch(url, { headers: { Range: `bytes=${start}-${end}` } });
    if (!resp.ok && resp.status !== 206) throw new Error(`Chunk fetch failed: ${resp.status}`);
    chunks.push(await resp.arrayBuffer());
    loaded += (end - start + 1);
    addLog(`  Progress: ${(loaded/totalSize*100).toFixed(1)}%`, 'info');
    if (window.progressElement) {
      window.progressElement.hidden = false;
      window.progressElement.value = loaded / totalSize;
    }
    if (window.statusElement) {
      window.statusElement.innerText = `Downloading chunked data: ${(loaded/1024/1024).toFixed(0)}MB / ${(totalSize/1024/1024).toFixed(0)}MB`;
    }
  }
  if (window.progressElement) {
    window.progressElement.hidden = true;
  }
  if (window.statusElement) {
    window.statusElement.innerText = "";
  }
  const total = chunks.reduce((s,c) => s + c.byteLength, 0);
  const out = new Uint8Array(total);
  let off = 0;
  for (const c of chunks) { out.set(new Uint8Array(c), off); off += c.byteLength; }
  addLog(`Assembled ${(total/1024/1024).toFixed(0)}MB OK`, 'info');
  return out.buffer;
}

// Hook XMLHttpRequest to intercept chunked background1.data downloads
const OriginalXHR = window.XMLHttpRequest;
window.XMLHttpRequest = function() {
  const xhr = new OriginalXHR();
  const originalOpen = xhr.open;
  const originalSend = xhr.send;
  let isIntercepted = false;
  let targetUrl = '';

  xhr.open = function(method, url, async, user, password) {
    targetUrl = url;
    if (method === 'GET' && (url === 'chunks/background1.data' || url.endsWith('/chunks/background1.data'))) {
      isIntercepted = true;
      addLog('XHR Intercepted background1.data! Switching to chunked transfer...', 'info');
    }
    return originalOpen.apply(this, arguments);
  };

  xhr.send = function(body) {
    if (isIntercepted) {
      fetchInChunks(targetUrl, 100 * 1024 * 1024).then(buffer => {
        // Mock properties on the intercepted XHR instance
        Object.defineProperty(xhr, 'readyState', { value: 4, writable: true });
        Object.defineProperty(xhr, 'status', { value: 200, writable: true });
        Object.defineProperty(xhr, 'statusText', { value: 'OK', writable: true });
        Object.defineProperty(xhr, 'response', { value: buffer, writable: true });
        Object.defineProperty(xhr, 'responseText', { value: '', writable: true });

        // Fire load progress hooks
        if (xhr.onprogress) {
          xhr.onprogress({ loaded: buffer.byteLength, total: buffer.byteLength });
        }
        if (xhr.onload) {
          xhr.onload();
        }
        if (xhr.onreadystatechange) {
          xhr.onreadystatechange();
        }
      }).catch(err => {
        addLog('Chunked download failed: ' + err.message, 'err');
        if (xhr.onerror) {
          xhr.onerror(err);
        }
      });
      return;
    }
    return originalSend.apply(this, arguments);
  };

  return xhr;
};

addLog('Loading hl2_launcher.js...', 'info');

// Correct dependency-order for dynamicLibraries.
// Fixes libclient.so hang: tier0/vstdlib/engine must load BEFORE client/server/GameUI.
var Module = {
  canvas: window.canvasElement,
  dynamicLibraries: [
    'libtier0.so',
    'libvstdlib.so',
    'libsteam_api.so',
    'libfilesystem_stdio.so',
    'libinputsystem.so',
    'libtogl.so',
    'libmaterialsystem.so',
    'libvtex_dll.so',
    'libstdshader_dx9.so',
    'libshaderapidx9.so',
    'libstudiorender.so',
    'libvphysics.so',
    'libsoundemittersystem.so', // original name is libsoundemittersystem.so, wait, let's keep exact list
    'libvaudio_minimp3.so',
    'libdatacache.so',
    'libscenefilecache.so',
    'libvideo_services.so',
    'libengine.so',
    'libvgui2.so',
    'libvguimatsurface.so',
    'libclient.so',
    'libserver.so',
    'libGameUI.so',
    'libServerBrowser.so',
    'liblauncher.so'
  ],
  onRuntimeInitialized: function() {
    addLog('WASM Runtime initialized! Engine starting...', 'info');
  },
  print:    function(t) { addLog('[stdout] ' + t); },
  printErr: function(t) { addLog('[stderr] ' + t, 'warn'); },
  setStatus: function(t) { if(t) addLog('[setStatus] ' + t); }
};

const s = document.createElement('script');
s.src = 'hl2_launcher.js';
s.onload  = function() { addLog('hl2_launcher.js loaded OK', 'info'); };
s.onerror = function() { addLog('hl2_launcher.js LOAD ERROR', 'err'); };
document.body.appendChild(s);
</script>
</body>
</html>
