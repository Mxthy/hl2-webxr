<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HL2 WebXR - Rendering Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #0f0; font-family: monospace; }
        #canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #debug-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,20,0,0.8); border: 1px solid #0f0; padding: 15px; }
    </style>
</head>
<body>
    <canvas id="canvas" width="1280" height="800" oncontextmenu="event.preventDefault()"></canvas>

    <div id="debug-overlay">
        <h2>λ HL2 WebXR - Rendering Test</h2>
        <div id="loading-status" style="color: yellow;">Booting Engine...</div>
        <div id="frame-count" style="color: #0f0; font-size: 12px;">Frames: 0</div>
    </div>

    <script>
        const htmlCanvas = document.getElementById('canvas');
        const statusElement = document.getElementById('loading-status');
        const frameCountElement = document.getElementById('frame-count');

        // NOT using transferControlToOffscreen — the main thread needs canvas access
        // for drawImage with ImageBitmaps from the GL worker.
        // The GL worker renders to its own fallback OffscreenCanvas and sends
        // ImageBitmaps back via postMessage.

        window.manualOffscreenCanvas = null;  // No manual transfer — let workers create their own
        window.canvasHasBeenTransferred = true;  // Skip transfer logic
        window.__frameCount = 0;
        
        // Expose the 2D context for the rendered frame handler
        window.__htmlCanvas = htmlCanvas;
        window.__htmlCanvasCtx2D = htmlCanvas.getContext('2d');
        
        // Frame counter update
        window.__updateFrameCount = function() {
            window.__frameCount++;
            if (frameCountElement) frameCountElement.textContent = 'Frames: ' + window.__frameCount;
        };

        window.Module = {
            canvas: null, 
            arguments: [
                '-game', 'hl2', 
                '-windowed', 
                '-w', '1280', 
                '-h', '800', 
                '-novid', 
                '-noip',
                '+mat_hdr_level', '0',
                '+mat_colorcorrection', '1',
                '+mat_picmip', '1',
                '+mat_queue_mode', '0'
            ],
            
            preRun: [
                function() {
                    if (typeof transferredCanvasNames !== 'undefined') {
                        transferredCanvasNames = []; 
                    }
                }
            ],
            
            setStatus: (text) => { if(text) statusElement.textContent = text; },
            
            onRuntimeInitialized: () => {
                statusElement.textContent = "ENGINE RUNTIME READY!";
                statusElement.style.color = "#0f0";
            }
        };

        const script = document.createElement('script');
        script.src = 'hl2_launcher.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
