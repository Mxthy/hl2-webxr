<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HL2 WebXR - Rendering Test</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; color: #0f0; font-family: monospace; }
        #canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        #debug-overlay { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,20,0,0.8); border: 1px solid #0f0; padding: 15px; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <div id="debug-overlay">
        <h2>λ HL2 WebXR - Rendering Test</h2>
        <div id="loading-status" style="color: yellow;">Booting Engine...</div>
    </div>

    <script>
        const htmlCanvas = document.getElementById('canvas');
        const statusElement = document.getElementById('loading-status');
        
        // 1. Manuelle OffscreenCanvas-Erstellung
        const offscreen = htmlCanvas.transferControlToOffscreen();
        offscreen.width = 1280;
        offscreen.height = 800;

        // 2. Global für den JS-Patch speichern
        window.manualOffscreenCanvas = offscreen;
        window.canvasHasBeenTransferred = false; // Flag für den Multiple-Worker-Fix

        window.Module = {
            canvas: null, 
            arguments: ['-game', 'hl2', '-windowed', '-w', '1280', '-h', '800', '-novid', '-noip'],
            
            preRun: [
                function() {
                    if (typeof transferredCanvasNames !== 'undefined') {
                        transferredCanvasNames = []; 
                    }
                }
            ],
            
            setStatus: (text) => { if(text) statusElement.textContent = text; },
            
            onRuntimeInitialized: () => {
                statusElement.textContent = "ENGINE RUNTIME READY!";
                statusElement.style.color = "#0f0";
                
                if (Module.wasmExports) {
                    Module._Engine_DisableAutoRender = Module.wasmExports.Engine_DisableAutoRender;
                }
            }
        };

        const script = document.createElement('script');
        script.src = 'hl2_launcher.js';
        document.body.appendChild(script);
    </script>
</body>
</html>
