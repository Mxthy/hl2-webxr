<!DOCTYPE html>
<html lang="de">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>HL2 WebXR - Export Discovery v3.2</title>
   <style>
       body { margin: 0; overflow: hidden; background-color: #050505; color: #0f0; font-family: monospace; }
       #game-canvas { display: block; width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
       #debug-overlay {
           position: absolute; top: 10px; left: 10px; z-index: 10;
           background: rgba(0,20,0,0.92); border: 1px solid #0f0; padding: 15px; border-radius: 4px;
           width: 640px; max-height: 95vh; overflow-y: auto; pointer-events: auto;
       }
       .log-entry { margin: 1px 0; padding: 0; border-bottom: 1px solid #020; }
       .log-error { color: #ff4444; }
       .log-warn { color: #ffaa00; }
       .log-info { color: #44aaff; }
       .log-debug { color: #888; }
       .log-normal { color: #0f0; }
       .log-success { color: #00ff88; font-weight: bold; }
       button { background: #030; color: #0f0; border: 1px solid #0f0; padding: 6px 10px; cursor: pointer; margin-top: 8px; font-family: monospace; }
       button:disabled { border-color: #333; color: #333; cursor: not-allowed; }
   </style>
</head>
<body>
   <canvas id="game-canvas" oncontextmenu="event.preventDefault()"></canvas>
   <div id="debug-overlay">
       <h2>HL2 WebXR - Export Discovery v3.2</h2>
       <div id="loading-status" class="log-warn">Lade Engine...</div>
       <div id="export-list" style="font-size: 12px; margin-top: 8px;"></div>
       <div style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
           <button id="btn-test-bridge" disabled style="width: auto;">Teste C++ Bridge</button>
           <button id="btn-dump-exports" disabled style="width: auto;">Dump alle Exports</button>
       </div>
       <div id="console-log" style="margin-top: 10px; font-size: 11px;"></div>
   </div>

   <script>
   (function() {
       var consoleLog = document.getElementById('console-log');
       function addLog(msg, type) {
           var div = document.createElement('div');
           div.className = 'log-entry log-' + (type || 'normal');
           div.textContent = '[' + (type || 'log') + '] ' + msg;
           consoleLog.prepend(div);
           while (consoleLog.children.length > 120) consoleLog.removeChild(consoleLog.lastChild);
       }
       var orig = { log: console.log, error: console.error, warn: console.warn, info: console.info, debug: console.debug };
       console.log = function() { addLog(Array.from(arguments).join(' '), 'normal'); orig.log.apply(console, arguments); };
       console.error = function() { addLog(Array.from(arguments).map(function(a){ return a && a.stack || String(a); }).join(' '), 'error'); orig.error.apply(console, arguments); };
       console.warn = function() { addLog(Array.from(arguments).join(' '), 'warn'); orig.warn.apply(console, arguments); };
       console.info = function() { addLog(Array.from(arguments).join(' '), 'info'); orig.info.apply(console, arguments); };
       console.debug = function() { addLog(Array.from(arguments).join(' '), 'debug'); orig.debug.apply(console, arguments); };
       window.onerror = function(msg, url, line, col, err) { addLog(msg + ' at ' + url + ':' + line, 'error'); return false; };
       window.addEventListener('unhandledrejection', function(e) { addLog('Unhandled: ' + (e.reason && e.reason.stack || e.reason || e), 'error'); });
       window.logCapture = addLog;
   })();
   </script>

   <script src="xr_wrapper.js"></script>
   <script>
       var canvas = document.getElementById('game-canvas');
       var loadingStatus = document.getElementById('loading-status');
       var exportList = document.getElementById('export-list');
       var btnTestBridge = document.getElementById('btn-test-bridge');
       var btnDumpExports = document.getElementById('btn-dump-exports');

       window.canvasElement = canvas;
       window.statusElement = loadingStatus;
       window.spinnerElement = { style: {} };
       window.progressElement = { hidden: true, value: 0 };

       window.Module = {
           canvas: canvas,
           arguments: ['-game', 'portal', '-windowed', '-w', '1280', '-h', '720', '-novid'],
           locateFile: function(path, prefix) {
               if (path.endsWith('.wasm') || path.endsWith('.so')) {
                   window.logCapture('Lade: ' + path, 'normal');
                   return './' + path;
               }
               return (prefix || '') + path;
           },
           setStatus: function(text) { if(text) loadingStatus.textContent = text; },
           onRuntimeInitialized: function() {
               loadingStatus.textContent = "Engine Runtime Ready!";
               loadingStatus.className = "log-success";
               window.logCapture('=== onRuntimeInitialized ===', 'success');
               setTimeout(checkWasmExports, 500);
           },
           onAbort: function(err) {
               loadingStatus.textContent = "ENGINE ABORTED";
               loadingStatus.className = "log-error";
               window.logCapture('ABORT: ' + (err && err.stack || err), 'error');
           }
       };

       // Safe export lookup — never triggers abort()
       // Uses Object.getOwnPropertyDescriptor to check if property is a real value
       function findExport(name) {
           var cleanName = name.replace(/^_/, '');

           // Path 1: Module[name] — check via hasOwnProperty to avoid getters
           try {
               var desc = Object.getOwnPropertyDescriptor(Module, name);
               if (desc && typeof desc.value === 'function')
                   return { found: true, source: 'Module', fn: desc.value };
               if (desc && typeof desc.get === 'function') {
                   // It's a getter — try to call it safely
                   try {
                       var val = desc.get.call(Module);
                       if (typeof val === 'function')
                           return { found: true, source: 'Module getter', fn: val };
                   } catch(e) {
                       // Getter aborts — skip this path
                   }
               }
           } catch(e) {}

           // Path 2: Module.wasmExports — check via keys, not getter
           try {
               var weDesc = Object.getOwnPropertyDescriptor(Module, 'wasmExports');
               if (weDesc && weDesc.value && typeof weDesc.value === 'object') {
                   if (typeof weDesc.value[name] === 'function')
                       return { found: true, source: 'wasmExports', fn: weDesc.value[name] };
                   if (typeof weDesc.value[cleanName] === 'function')
                       return { found: true, source: 'wasmExports (clean)', fn: weDesc.value[cleanName] };
               }
               if (weDesc && typeof weDesc.get === 'function') {
                   try {
                       var we = weDesc.get.call(Module);
                       if (we && typeof we === 'object') {
                           if (typeof we[name] === 'function')
                               return { found: true, source: 'wasmExports getter', fn: we[name] };
                           if (typeof we[cleanName] === 'function')
                               return { found: true, source: 'wasmExports getter (clean)', fn: we[cleanName] };
                       }
                   } catch(e) {}
               }
           } catch(e) {}

           // Path 3: ccall/cwrap — check via hasOwnProperty
           try {
               var ccallDesc = Object.getOwnPropertyDescriptor(Module, 'ccall');
               if (ccallDesc && typeof ccallDesc.value === 'function') {
                   var fn = Module.cwrap(cleanName, null, []);
                   if (fn) return { found: true, source: 'cwrap', fn: fn };
               }
               if (ccallDesc && typeof ccallDesc.get === 'function') {
                   try {
                       var ccall = ccallDesc.get.call(Module);
                       if (typeof ccall === 'function') {
                           var fn = Module.cwrap(cleanName, null, []);
                           if (fn) return { found: true, source: 'ccall getter', fn: fn };
                       }
                   } catch(e) {}
               }
           } catch(e) {}

           // Path 4: window scope
           try {
               if (typeof window[name] === 'function')
                   return { found: true, source: 'window', fn: window[name] };
           } catch(e) {}

           return { found: false, source: null, fn: null };
       }

       function checkWasmExports() {
           var hooks = [
               '_Engine_DisableAutoRender',
               '_Engine_RenderSingleFrame',
               '_Engine_SetCameraMatrix',
               '_Engine_SetProjectionMatrix',
               '_Engine_ResetCameraMatrix',
               '_DisableAutoRenderLoop',
               '_SetCameraMatrices',
               '_RenderXRFrame',
               '_EnableAutoRenderLoop',
               '_malloc',
               '_free'
           ];

           exportList.innerHTML = '';
           var foundCount = 0;

           hooks.forEach(function(h) {
               var result = findExport(h);
               if (result.found) foundCount++;
               var color = result.found ? '#0f0' : (h.indexOf('Engine') >= 0 || h.indexOf('Render') >= 0 ? '#fa0' : '#f00');
               exportList.innerHTML += '<div style="color:' + color + '">' + h + ': ' + (result.found ? '✓ ' + result.source : 'MISSING') + '</div>';
           });

           // Check what's available on Module
           try {
               var modKeys = Object.keys(Module).filter(function(k) {
                   return k.startsWith('_') && (k.indexOf('Engine') >= 0 || k.indexOf('Render') >= 0 || k.indexOf('Disable') >= 0 || k.indexOf('Camera') >= 0 || k === '_malloc' || k === '_free');
               });
               if (modKeys.length > 0)
                   exportList.innerHTML += '<div style="color:#08a;">Module._ keys: ' + modKeys.join(', ') + '</div>';

               var allUnderscoreKeys = Object.keys(Module).filter(function(k) { return k.startsWith('_'); }).sort();
               exportList.innerHTML += '<div style="color:#666;">Module._ total: ' + allUnderscoreKeys.length + ' keys</div>';
               if (allUnderscoreKeys.length > 0)
                   exportList.innerHTML += '<div style="color:#666;">First 20: ' + allUnderscoreKeys.slice(0, 20).join(', ') + '</div>';
           } catch(e) {
               exportList.innerHTML += '<div style="color:#f00;">Module keys error: ' + e.message + '</div>';
           }

           // Check wasmExports
           try {
               var weDesc = Object.getOwnPropertyDescriptor(Module, 'wasmExports');
               if (weDesc) {
                   if (weDesc.value && typeof weDesc.value === 'object') {
                       var weKeys = Object.keys(weDesc.value).filter(function(k) {
                           return k.indexOf('Engine') >= 0 || k.indexOf('Render') >= 0 || k.indexOf('Disable') >= 0 || k.indexOf('Camera') >= 0;
                       });
                       if (weKeys.length > 0)
                           exportList.innerHTML += '<div style="color:#0f0;">wasmExports hooks: ' + weKeys.join(', ') + '</div>';
                       else
                           exportList.innerHTML += '<div style="color:#f00;">wasmExports: no hook symbols</div>';
                   } else if (weDesc.get) {
                       try {
                           var we = weDesc.get.call(Module);
                           if (we && typeof we === 'object') {
                               var weKeys = Object.keys(we).filter(function(k) {
                                   return k.indexOf('Engine') >= 0 || k.indexOf('Render') >= 0 || k.indexOf('Disable') >= 0;
                               });
                               if (weKeys.length > 0)
                                   exportList.innerHTML += '<div style="color:#0f0;">wasmExports (getter) hooks: ' + weKeys.join(', ') + '</div>';
                               else
                                   exportList.innerHTML += '<div style="color:#f00;">wasmExports (getter): no hook symbols (' + Object.keys(we).length + ' total)</div>';
                           }
                       } catch(e) {
                           exportList.innerHTML += '<div style="color:#f00;">wasmExports getter aborts</div>';
                       }
                   }
               } else {
                   exportList.innerHTML += '<div style="color:#f00;">wasmExports: not on Module</div>';
               }
           } catch(e) {}

           // ccall availability
           try {
               var ccallDesc = Object.getOwnPropertyDescriptor(Module, 'ccall');
               if (ccallDesc && (typeof ccallDesc.value === 'function' || typeof ccallDesc.get === 'function')) {
                   exportList.innerHTML += '<div style="color:#0f0;">ccall: available</div>';
               } else {
                   exportList.innerHTML += '<div style="color:#f00;">ccall: not available (needs EXPORTED_RUNTIME_METHODS)</div>';
               }
           } catch(e) {}

           window.logCapture('Found ' + foundCount + '/' + hooks.length + ' hooks', foundCount > 0 ? 'success' : 'warn');

           var engineDisable = findExport('_Engine_DisableAutoRender');
           var bridgeDisable = findExport('_DisableAutoRenderLoop');
           if (engineDisable.found || bridgeDisable.found) {
               window.logCapture('Bridge hook found via ' + (engineDisable.found ? engineDisable.source : bridgeDisable.source) + '!', 'success');
               btnTestBridge.disabled = false;
           } else {
               window.logCapture('No bridge hooks found — awaiting Build #89+', 'warn');
           }
           btnDumpExports.disabled = false;
       }

       btnTestBridge.addEventListener('click', function() {
           window.logCapture('=== Test C++ Bridge ===', 'info');
           try {
               var hooks = ['_Engine_DisableAutoRender', '_DisableAutoRenderLoop'];
               var called = false;
               for (var i = 0; i < hooks.length; i++) {
                   var r = findExport(hooks[i]);
                   if (r.found) {
                       window.logCapture('Calling ' + hooks[i] + ' via ' + r.source + '...', 'normal');
                       r.fn();
                       window.logCapture(hooks[i] + '() success!', 'success');
                       called = true;
                       break;
                   }
               }
               if (!called) window.logCapture('No hook available to call', 'error');
           } catch (e) {
               window.logCapture('Bridge call failed: ' + e.message, 'error');
           }
       });

       btnDumpExports.addEventListener('click', function() {
           window.logCapture('=== Dump Exports ===', 'info');
           try {
               var modKeys = Object.keys(Module).filter(function(k){ return k.startsWith('_'); }).sort();
               window.logCapture('Module._ (' + modKeys.length + '): ' + modKeys.slice(0, 40).join(', '), 'normal');
           } catch(e) { window.logCapture('Module keys error: ' + e.message, 'error'); }

           try {
               var weDesc = Object.getOwnPropertyDescriptor(Module, 'wasmExports');
               if (weDesc && weDesc.get) {
                   try {
                       var we = weDesc.get.call(Module);
                       if (we) {
                           var weKeys = Object.keys(we).sort();
                           window.logCapture('wasmExports (' + weKeys.length + '): ' + weKeys.slice(0, 50).join(', '), 'normal');
                           var hooks = weKeys.filter(function(k) {
                               return k.indexOf('Engine') >= 0 || k.indexOf('Render') >= 0 || k.indexOf('Camera') >= 0 || k.indexOf('Disable') >= 0;
                           });
                           if (hooks.length > 0)
                               window.logCapture('Hook symbols: ' + hooks.join(', '), 'success');
                           else
                               window.logCapture('No hook symbols in wasmExports', 'error');
                       }
                   } catch(e) { window.logCapture('wasmExports getter failed: ' + e.message, 'error'); }
               } else if (weDesc && weDesc.value) {
                   var weKeys = Object.keys(weDesc.value).sort();
                   window.logCapture('wasmExports (' + weKeys.length + '): ' + weKeys.slice(0, 50).join(', '), 'normal');
               } else {
                   window.logCapture('wasmExports not available', 'warn');
               }
           } catch(e) { window.logCapture('wasmExports error: ' + e.message, 'error'); }

           // Window scope
           var winHooks = Object.keys(window).filter(function(k) {
               return k.startsWith('_Engine') || k.startsWith('_Disable') || k.startsWith('_RenderXR') || k.startsWith('_SetCamera') || k.startsWith('_Enable') || k.startsWith('_malloc') || k.startsWith('_free');
           }).sort();
           if (winHooks.length > 0)
               window.logCapture('window._ hooks: ' + winHooks.join(', '), 'normal');
       });

       window.logCapture('Lade hl2_launcher.js (v3.2)...', 'info');
       var script = document.createElement('script');
       script.src = 'hl2_launcher.js?v=32';
       document.body.appendChild(script);
   </script>
</body>
</html>
