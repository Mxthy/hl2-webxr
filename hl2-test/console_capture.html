<!DOCTYPE html>
<html><head><title>HL2 Debug</title></head>
<body style="background:#1a1a1a;color:#0f0;font-family:monospace;font-size:12px;">
<div id="console" style="white-space:pre-wrap;max-height:90vh;overflow:auto;padding:10px;"></div>
<iframe id="frame" style="width:100%;height:600px;border:1px solid #333;" src="about:blank"></iframe>
<script>
const con = document.getElementById('console');
function log(msg) { con.textContent += msg + '\n'; }

// Override console.error before loading
const origError = console.error;
console.error = function(...args) {
    log('ERROR: ' + args.join(' '));
    origError.apply(console, args);
};
console.log = function(...args) { log(args.join(' ')); };
console.warn = function(...args) { log('WARN: ' + args.join(' ')); };
window.onerror = function(msg, url, line, col, err) {
    log('UNCAUGHT: ' + msg + ' at ' + (url||'').split('/').pop() + ':' + line);
    return false;
};

log('Loading hl2_launcher.html in iframe...');
setTimeout(() => {
    document.getElementById('frame').src = 'hl2_launcher.html';
}, 1000);
</script>
</body></html>
