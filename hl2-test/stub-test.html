<!DOCTYPE html>
<html>
<head><title>Stub Test</title>
<style>body{background:#111;color:#0f0;font-family:monospace;padding:8px}</style>
</head>
<body>
<div id="log"></div>
<script>
function log(msg, color='#0f0') {
  const d = document.createElement('div');
  d.style.color = color;
  d.textContent = msg;
  document.getElementById('log').appendChild(d);
}
async function run() {
  log('Fetching libGLESv3.so stub...');
  const r = await fetch('/libGLESv3.so');
  const buf = await r.arrayBuffer();
  log(`Got ${buf.byteLength} bytes`);
  
  try {
    const result = await WebAssembly.instantiate(buf, {
      env: new Proxy({}, { get(t,k) { return k === '__memory_base' ? 0 : k === '__table_base' ? 0 : () => 0; } }),
      'GOT.mem': new Proxy({}, { get(t,k) { return {value:0}; } }),
      'GOT.func': new Proxy({}, { get(t,k) { return {value:()=>{}}; } }),
      'wasi_snapshot_preview1': new Proxy({}, { get(t,k) { return () => 0; } }),
    });
    log('WebAssembly.instantiate: OK ✓', '#4f4');
    log(`Exports: ${Object.keys(result.instance.exports).join(', ') || '(none)'}`);
  } catch(e) {
    log(`ERROR: ${e}`, '#f44');
    log(`Stack: ${e.stack}`, '#f88');
  }
  
  // Also test the actual loadDylibs path: compile first
  try {
    const r2 = await fetch('/libGLESv3.so');
    const buf2 = await r2.arrayBuffer();
    const mod = await WebAssembly.compile(buf2);
    log('WebAssembly.compile: OK ✓', '#4f4');
    const inst = new WebAssembly.Instance(mod, {
      env: new Proxy({}, { get(t,k) { return k === '__memory_base' ? 0 : k === '__table_base' ? 0 : () => 0; } }),
      'GOT.mem': new Proxy({}, { get(t,k) { return {value:0}; } }),
      'GOT.func': new Proxy({}, { get(t,k) { return {value:()=>{}}; } }),
      'wasi_snapshot_preview1': new Proxy({}, { get(t,k) { return () => 0; } }),
    });
    log('new Instance from Module: OK ✓', '#4f4');
  } catch(e) {
    log(`ERROR (compile path): ${e}`, '#f44');
  }
}
run();
</script>
</body>
</html>
