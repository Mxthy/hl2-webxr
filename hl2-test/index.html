<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111">
  <title>Half-Life 2 WebXR</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#111;color:#fff;font-family:Arial,sans-serif;overflow:hidden;height:100vh;width:100vw}
    #canvas{display:block;width:100%;height:100%;background:#000;touch-action:none;position:absolute;top:0;left:0}
    #overlay{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:rgba(0,0,0,.9);z-index:10}
    #overlay.hidden{display:none}
    .game-btn{display:block;margin:8px auto;width:360px;max-width:90vw;cursor:pointer;border-radius:4px;overflow:hidden;background:#1a1a1a;border:2px solid #333;padding:18px 24px;font-size:16px;color:#ccc;transition:border-color .1s,transform .1s;text-align:left}
    .game-btn:hover{border-color:#ff6600;transform:scale(1.02);color:#fff}
    #enter-vr-btn{background:linear-gradient(135deg,#ff6600,#cc4400);border:none;color:#fff;padding:14px 32px;border-radius:6px;font-size:18px;font-weight:bold;cursor:pointer;display:none;box-shadow:0 4px 20px rgba(255,100,0,.5);transition:transform .1s}
    #enter-vr-btn:hover{transform:scale(1.05)}
    #enter-vr-btn.visible{display:block}
    #xr-status{font-size:12px;color:#555}
    #loading{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);text-align:center;display:none;z-index:11}
    #loading.visible{display:block}
    #status{font-weight:bold;color:#aaa;margin-bottom:8px;font-size:13px}
    #progress{width:280px;height:5px;border-radius:3px;background:#333;border:none;-webkit-appearance:none}
    #progress::-webkit-progress-bar{background:#333;border-radius:3px}
    #progress::-webkit-progress-value{background:#ff6600;border-radius:3px}
    .spinner{width:28px;height:28px;border:3px solid #333;border-top-color:#ff6600;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    #controls{position:fixed;top:10px;right:10px;display:none;gap:6px;z-index:20;flex-direction:row}
    .ctrl-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
    .ctrl-btn:hover{background:rgba(255,255,255,.2)}
    h1{font-size:26px;font-weight:bold;letter-spacing:3px;color:#ff6600}
    .subtitle{font-size:11px;color:#444;margin-top:4px}
  </style>

  <!-- Console Log Capture für Debugging -->
  <style>
    #console-log {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 160px; overflow-y: auto;
      background: rgba(0,0,0,0.85); color: #0f0;
      font-family: monospace; font-size: 10px;
      padding: 4px 8px; z-index: 9999;
      border-top: 1px solid #333;
      display: none; /* Standardmäßig versteckt */
    }
    #console-log.visible { display: block; }
    #console-log .err { color: #f44; }
    #console-log .warn { color: #fa0; }
    #log-toggle {
      position: fixed; bottom: 165px; right: 8px; z-index: 10000;
      background: #333; color: #fff; border: 1px solid #555;
      padding: 2px 6px; font-size: 10px; cursor: pointer;
      font-family: monospace;
    }
  </style>
  <script>
  (function() {
    // Log-Panel Setup
    const panel = document.createElement('div');
    panel.id = 'console-log';
    const btn = document.createElement('button');
    btn.id = 'log-toggle';
    btn.textContent = 'LOG';
    btn.onclick = () => panel.classList.toggle('visible');
    
    document.addEventListener('DOMContentLoaded', () => {
      document.body.appendChild(panel);
      document.body.appendChild(btn);
    });
    
    let count = 0;
    function addLine(type, args) {
      const line = document.createElement('div');
      if (type !== 'log') line.className = type;
      const t = new Date().toISOString().slice(11,19);
      const text = Array.from(args).map(a => {
        try { return typeof a === 'object' ? JSON.stringify(a).slice(0,200) : String(a).slice(0,500); }
        catch(e) { return String(a).slice(0,200); }
      }).join(' ');
      line.textContent = `[${t}] ${text}`;
      panel.appendChild(line);
      panel.scrollTop = panel.scrollHeight;
      if (++count === 1) panel.classList.add('visible'); // Zeige beim ersten Log
      if (type === 'err') panel.classList.add('visible'); // Zeige immer bei Fehlern
    }
    
    const _log = console.log.bind(console);
    const _err = console.error.bind(console);
    const _warn = console.warn.bind(console);
    console.log = (...a) => { _log(...a); addLine('log', a); };
    console.error = (...a) => { _err(...a); addLine('err', a); };
    console.warn = (...a) => { _warn(...a); addLine('warn', a); };
    window.addEventListener('error', e => addLine('err', [`UNCAUGHT: ${e.message} @ ${e.filename}:${e.lineno}`]));
    window.addEventListener('unhandledrejection', e => addLine('err', [`PROMISE REJECT: ${e.reason}`]));
  })();
  </script>
</head>
<body>
  <canvas id="canvas" oncontextmenu="return false;" tabindex="-1"></canvas>

  <div id="overlay">
    <h1>HALF-LIFE 2</h1>
    <div class="subtitle">WebXR Port — Quest 3</div>

    <div id="game-select">
      <div class="game-btn" onclick="pickGame('hl2')">▶ Half-Life 2</div>
      <div class="game-btn" onclick="pickGame('ep1')">▶ Episode One</div>
      <div class="game-btn" onclick="pickGame('ep2')">▶ Episode Two</div>
    </div>

    <button id="enter-vr-btn" onclick="window.xrWrapper && window.xrWrapper.enterVR()">🥽 Enter VR</button>
    <div id="xr-status">WebXR wird geprüft...</div>
  </div>

  <div id="loading">
    <div class="spinner" id="spinner"></div>
    <div id="status">Lädt...</div>
    <progress id="progress" max="100" value="0" hidden></progress>
  </div>

  <div id="controls">
    <button class="ctrl-btn" onclick="document.getElementById('canvas').requestFullscreen()">Fullscreen</button>
    <button class="ctrl-btn" onclick="clearCacheAndReload()">Cache leeren</button>
  </div>

  <script>
    // DOM-Referenzen global (für pre.js / post.js)
    window.canvasElement = document.getElementById('canvas');
    window.statusElement  = document.getElementById('status');
    window.progressElement= document.getElementById('progress');
    window.spinnerElement = document.getElementById('spinner');

    // Canvas auf Viewport-Größe
    canvasElement.width  = screen.availWidth;
    canvasElement.height = screen.availHeight;

    function pickGame(game) {
      try { sessionStorage.setItem('ep', game); } catch(e) {}
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('loading').classList.add('visible');
      document.getElementById('controls').style.display = 'flex';
      if (window.__resolveGame) window.__resolveGame(game);
      else if (window.Module && Module.__resolveGame) Module.__resolveGame(game);
    }

    async function clearCacheAndReload() {
      try {
        if (caches) for (const k of await caches.keys()) await caches.delete(k);
        if (navigator.serviceWorker) {
          for (const r of await navigator.serviceWorker.getRegistrations()) await r.unregister();
        }
      } catch(e) {}
      location.reload();
    }

    // WebXR Check
    (async () => {
      const xrStatus = document.getElementById('xr-status');
      const enterVr  = document.getElementById('enter-vr-btn');
      if (navigator.xr) {
        try {
          if (await navigator.xr.isSessionSupported('immersive-vr')) {
            xrStatus.textContent = '✓ Quest 3 WebXR verfügbar';
            xrStatus.style.color = '#4a4';
            enterVr.classList.add('visible');
          } else {
            xrStatus.textContent = '⚠ WebXR nicht unterstützt — Desktop-Modus aktiv';
            xrStatus.style.color = '#a84';
          }
        } catch(e) {
          xrStatus.textContent = '✗ WebXR-Fehler: ' + e.message;
          xrStatus.style.color = '#a44';
        }
      } else {
        xrStatus.textContent = '✗ Kein WebXR — Desktop-Modus';
        xrStatus.style.color = '#555';
      }
    })();

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => navigator.serviceWorker.ready)
        .then(() => {
          if (!self.crossOriginIsolated && !sessionStorage.getItem('__coiReloaded')) {
            sessionStorage.setItem('__coiReloaded', '1');
            location.reload();
          } else {
            sessionStorage.removeItem('__coiReloaded');
          }
        })
        .catch(e => console.warn('[SW] Fehler:', e));
    }
  </script>

  <script src="xr_wrapper.js" defer></script>
  <script src="hl2_launcher.js" async></script>
</body>
</html>
