<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HL2 WebXR — Build #93 Debug</title>
  <style>
    body { background: #1a1a2e; color: #e0e0e0; font-family: monospace; margin: 0; padding: 20px; }
    #canvas { width: 1280px; height: 720px; border: 2px solid #444; display: block; margin: 10px 0; }
    #log { position: fixed; right: 20px; top: 20px; width: 500px; height: 80vh; overflow-y: auto;
           background: #0d0d1a; padding: 10px; border: 1px solid #333; font-size: 12px; }
    .btn { background: #16213e; color: #e0e0e0; border: 1px solid #444; padding: 8px 16px;
           cursor: pointer; margin: 4px; border-radius: 4px; }
    .btn:hover { background: #0f3460; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #status { display: inline-block; padding: 4px 12px; border-radius: 4px; background: #333; }
  </style>
</head>
<body>
  <h2>HL2 WebXR — Build #93 Debug</h2>
  <div>
    <span id="status">Idle</span>
    <button class="btn" id="btnStart">Start Engine</button>
    <button class="btn" id="btnTestBridge" disabled>Test Bridge</button>
    <button class="btn" id="btnCheckExports" disabled>Check Exports</button>
  </div>
  <canvas id="canvas"></canvas>
  <div id="log"></div>

  <script>
    // Global canvasElement for pre.js
    var canvasElement = document.getElementById('canvas');
    var statusElement = document.getElementById('status');
    var progressElement = null;
    var spinnerElement = null;
    window.canvasElement = canvasElement;
    window.statusElement = statusElement;

    var logEl = document.getElementById('log');
    function log(msg) {
      var ts = new Date().toISOString().substr(11, 8);
      logEl.innerHTML += '<div>[' + ts + '] ' + msg + '</div>';
      logEl.scrollTop = logEl.scrollHeight;
      console.log('[Debug] ' + msg);
    }

    // Check exports before engine starts
    function checkWasmExports() {
      log("=== WASM Export Check ===");
      var found = [], missing = [];
      var names = ['_malloc', '_free', '_Engine_DisableAutoRender', '_Engine_RenderSingleFrame',
                    '_Engine_SetCameraMatrix', '_Engine_SetProjectionMatrix', '_Engine_ResetCameraMatrix',
                    '_DisableAutoRenderLoop', '_SetCameraMatrices', '_RenderXRFrame',
                    '_EnableAutoRenderLoop'];
      names.forEach(function(n) {
        if (typeof Module[n] === 'function') { found.push(n); }
        else { missing.push(n); }
      });
      log("Found: " + found.join(', '));
      if (missing.length) log("Missing: " + missing.join(', '));

      // Also check via ccall / cwrap / wasmExports paths
      try {
        if (typeof Module.ccall === 'function') log("ccall: available ✅");
        if (typeof Module.cwrap === 'function') log("cwrap: available ✅");
        if (typeof Module.wasmExports === 'function') {
          var we = Module.wasmExports();
          if (we && we.Engine_DisableAutoRender) log("wasmExports.Engine_DisableAutoRender: FOUND ✅");
          else log("wasmExports available but Engine_DisableAutoRender not in it");
        }
      } catch(e) { log("Export path check error: " + e.message); }
    }

    // Module config
    var Module = Module || {};
    Module.canvas = canvasElement;
    Module.arguments = ['-game', 'hl2', '-windowed', '-w', '1280', '-h', '720', '-novid', '-noip',
                        '+mat_hdr_level', '0', '+mat_colorcorrection', '1', '+mat_picmip', '1', '-nosteam'];

    Module.onRuntimeInitialized = function() {
      log("ENGINE RUNTIME READY!");
      document.getElementById('btnTestBridge').disabled = false;
      document.getElementById('btnCheckExports').disabled = false;
      checkWasmExports();
    };

    Module.onAbort = function(e) { log("ABORT: " + e); };

    Module.locateFile = function(path) {
      if (path.endsWith('.wasm')) return './hl2_launcher.wasm';
      if (path.endsWith('.js')) return './hl2_launcher.js';
      if (path.endsWith('.data')) {
        return 'https://hl2-webxr-assets.r2.cloudflarestorage.com/chunks/' + path;
      }
      return path;
    };

    Module.dynamicLibraries = [];

    // Load engine script
    var script = document.createElement('script');
    script.src = './hl2_launcher.js';
    script.onload = function() { log("hl2_launcher.js loaded"); };
    script.onerror = function() { log("Failed to load hl2_launcher.js"); };
    document.head.appendChild(script);

    // Button handlers
    document.getElementById('btnStart').addEventListener('click', function() {
      log("Starting engine...");
      statusElement.textContent = 'Running';
      if (typeof Module.callMain === 'function') {
        try { Module.callMain(Module.arguments); } catch(e) { log("callMain error: " + e.message); }
      }
    });

    document.getElementById('btnTestBridge').addEventListener('click', function() {
      log("=== C++ Bridge Test ===");
      try {
        if (typeof Module._Engine_DisableAutoRender === 'function') {
          Module._Engine_DisableAutoRender();
          log("✅ Module._Engine_DisableAutoRender() called");
        } else if (Module.asm && typeof Module.asm._Engine_DisableAutoRender === 'function') {
          Module.asm._Engine_DisableAutoRender();
          log("✅ Module.asm._Engine_DisableAutoRender() called");
        } else if (typeof Module.ccall === 'function') {
          Module.ccall('Engine_DisableAutoRender', 'v', [], []);
          log("✅ Module.ccall('Engine_DisableAutoRender') called");
        } else if (Module.wasmExports && Module.wasmExports().Engine_DisableAutoRender) {
          Module.wasmExports().Engine_DisableAutoRender();
          log("✅ Module.wasmExports().Engine_DisableAutoRender() called");
        } else {
          log("❌ Could not find Engine_DisableAutoRender via any path");
          log("Module keys: " + Object.keys(Module).filter(function(k){ return k.indexOf('Engine') >= 0 || k.indexOf('Disable') >= 0 || k.indexOf('Render') >= 0; }).join(', '));
        }
      } catch(e) { log("Crash: " + e.message); }
    });

    document.getElementById('btnCheckExports').addEventListener('click', checkWasmExports);
  </script>
</body>
</html>
