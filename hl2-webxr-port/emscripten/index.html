<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Half-Life 2 — WebXR Port (Quest 3)</title>
  <!-- Optimierte Viewport-Tags für VR-Browser wie Meta Quest Browser -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <style>
    :root {
      --hl-orange: #f80;
      --bg-dark: #111;
      --panel-bg: rgba(20, 20, 20, 0.85);
      --text-green: #0f0;
    }
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: var(--bg-dark);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      user-select: none;
    }
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      z-index: 1;
    }
    /* UI Overlay */
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      pointer-events: none;
      box-sizing: border-box;
      padding: 20px;
    }
    .interactive {
      pointer-events: auto;
    }
    /* Header Panel */
    #header-panel {
      background: var(--panel-bg);
      border-left: 4px solid var(--hl-orange);
      padding: 15px 25px;
      border-radius: 4px;
      max-width: 500px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    h1 {
      margin: 0 0 5px 0;
      color: var(--hl-orange);
      font-size: 24px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .status-area {
      display: flex;
      align-items: center;
      font-size: 14px;
      color: #aaa;
    }
    #spinner {
      margin-right: 10px;
      font-size: 18px;
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #status-text {
      color: var(--text-green);
      font-family: monospace;
    }

    /* Central Launcher Panel */
    #launcher-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel-bg);
      border: 1px solid #333;
      border-top: 5px solid var(--hl-orange);
      border-radius: 6px;
      padding: 30px;
      width: 90%;
      max-width: 450px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      z-index: 12;
    }
    .game-select-group {
      margin-bottom: 25px;
    }
    .game-select-group label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #ccc;
    }
    .select-style {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 12px;
      width: 100%;
      border-radius: 4px;
      font-size: 16px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .select-style:focus {
      border-color: var(--hl-orange);
    }
    
    /* Buttons */
    .btn {
      background: var(--hl-orange);
      color: #000;
      border: none;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      box-sizing: border-box;
      transition: background 0.2s, transform 0.1s;
      margin-bottom: 12px;
    }
    .btn:hover {
      background: #ffa500;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-xr {
      background: var(--text-green);
      color: #000;
      display: none; /* Wird via JavaScript eingeblendet, wenn WebXR verfügbar */
    }
    .btn-xr:hover {
      background: #3f3;
    }
    .btn-secondary {
      background: #444;
      color: #fff;
    }
    .btn-secondary:hover {
      background: #555;
    }

    /* Loading Area */
    #progress-container {
      margin-top: 20px;
      display: none;
    }
    #progress {
      width: 100%;
      height: 10px;
      appearance: none;
      border: none;
      background-color: #222;
      border-radius: 5px;
      overflow: hidden;
    }
    #progress::-webkit-progress-bar {
      background-color: #222;
    }
    #progress::-webkit-progress-value {
      background-color: var(--hl-orange);
    }
    #progress-percentage {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
      display: block;
    }

    /* Log Output for Debugging on Quest */
    #log-panel {
      background: rgba(0,0,0,0.85);
      border: 1px solid #222;
      border-radius: 4px;
      padding: 10px;
      height: 120px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 11px;
      color: #aaa;
      max-width: 500px;
      margin-top: auto;
    }
    .log-line { margin: 2px 0; }
    .log-err { color: #f44; }
    .log-warn { color: var(--hl-orange); }
    .log-info { color: #4af; }
    .log-green { color: var(--text-green); }
  </style>
</head>
<body>

  <!-- Game Canvas -->
  <canvas id="canvas"></canvas>

  <!-- HTML UI Container -->
  <div id="ui-container">
    <!-- Header / Status Panel -->
    <div id="header-panel" class="interactive">
      <h1>Half-Life 2 WebXR</h1>
      <div class="status-area">
        <span id="spinner" style="display:none">⚙️</span>
        <span id="status-text">Initialisiere Client...</span>
      </div>
    </div>

    <!-- Central Launcher Panel -->
    <div id="launcher-panel" class="interactive">
      <div class="game-select-group">
        <label for="game-select">Spiel-Version wählen</label>
        <select id="game-select" class="select-style">
          <option value="hl2" selected>Half-Life 2</option>
          <option value="ep1">Half-Life 2: Episode One</option>
          <option value="ep2">Half-Life 2: Episode Two</option>
        </select>
      </div>

      <!-- Action-Buttons -->
      <button id="btn-start" class="btn">Spiel starten</button>
      <button id="btn-enter-xr" class="btn btn-xr">VR Modus Starten</button>
      <button id="btn-fullscreen" class="btn btn-secondary">Vollbild</button>

      <!-- Progress/Loading-Anzeige -->
      <div id="progress-container">
        <progress id="progress" value="0" max="1"></progress>
        <span id="progress-percentage">Lade Assets... 0%</span>
      </div>
    </div>

    <!-- Bottom Log Output (Perfekt für Debugging direkt in der Brille) -->
    <div id="log-panel" class="interactive"></div>
  </div>

  <!-- Skripte einbinden -->
  <script src="pre.js"></script>
  <script src="sw.js"></script>
  <script src="xr_wrapper.js"></script>
  
  <script>
    // Custom Debug Log Capture
    const logPanel = document.getElementById('log-panel');
    function addConsoleLog(msg, type = '') {
      const line = document.createElement('div');
      line.className = 'log-line ' + (type ? 'log-' + type : '');
      line.innerText = '[' + new Date().toISOString().substring(11, 23) + '] ' + msg;
      logPanel.appendChild(line);
      logPanel.scrollTop = logPanel.scrollHeight;
    }

    // Intercept standard console methods
    ['log','info','warn','error'].forEach(method => {
      const orig = console[method];
      console[method] = function() {
        orig.apply(console, arguments);
        const args = Array.from(arguments).map(a => typeof a === 'object' ? JSON.stringify(a) : String(a)).join(' ');
        let type = method;
        if (method === 'log') type = '';
        addConsoleLog(args, type);
      };
    });

    window.onerror = function(msg, src, line, col, err) {
      addConsoleLog('UNCAUGHT: ' + msg + ' @ ' + src + ':' + line, 'err');
      return false;
    };
    window.onunhandledrejection = function(e) {
      addConsoleLog('REJECTION: ' + e.reason, 'err');
    };

    // DOM-Element-Zuweisung für globalen Zugriff durch pre.js/post.js
    window.canvasElement = document.getElementById('canvas');
    window.statusElement = document.getElementById('status-text');
    window.spinnerElement = document.getElementById('spinner');
    window.progressElement = document.getElementById('progress');

    // Setup Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('[MAIN] ServiceWorker registriert mit Scope: ', reg.scope))
        .catch(err => console.error('[MAIN] ServiceWorker-Registrierung fehlgeschlagen: ', err));
    }

    // UI Buttons Events
    const btnStart = document.getElementById('btn-start');
    const btnEnterXR = document.getElementById('btn-enter-xr');
    const btnFullscreen = document.getElementById('btn-fullscreen');
    const gameSelect = document.getElementById('game-select');
    const progressContainer = document.getElementById('progress-container');
    const progressPerc = document.getElementById('progress-percentage');

    btnFullscreen.addEventListener('click', () => {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen()
          .catch(err => console.error('Fehler beim Vollbild-Wechsel:', err));
      } else {
        document.exitFullscreen();
      }
    });

    // Start-Klick-Handling
    btnStart.addEventListener('click', async () => {
      const selectedGame = gameSelect.value;
      console.log(`[MAIN] Starte Ladevorgang für: ${selectedGame}...`);
      
      btnStart.disabled = true;
      gameSelect.disabled = true;
      progressContainer.style.display = 'block';

      try {
        // Starte das Chunked-Asset-Laden über den Asset-Packer (xr_wrapper)
        if (window.xrWrapper && window.xrWrapper.loadAndUnpackAssets) {
          await window.xrWrapper.loadAndUnpackAssets(selectedGame, (loaded, total) => {
            const ratio = loaded / total;
            window.progressElement.value = ratio;
            progressPerc.innerText = `Lade Assets... ${Math.round(ratio * 100)}% (${(loaded / 1024 / 1024).toFixed(1)}MB / ${(total / 1024 / 1024).toFixed(1)}MB)`;
          });
          
          console.log('[MAIN] Assets erfolgreich entpackt! Engine wird initialisiert...');
          
          // Triggere das Start-Promise für Emscripten (Engine-Choice-Pattern)
          if (window.xrWrapper && window.xrWrapper.resolveGameChoice) {
            window.xrWrapper.resolveGameChoice(selectedGame);
          }
          
          // Engine-Skript laden falls noch nicht geschehen
          loadEngineBundle();
        } else {
          throw new Error('xr_wrapper.js nicht geladen oder inkompatibel!');
        }
      } catch (err) {
        console.error('[MAIN] Start-Fehler:', err);
        btnStart.disabled = false;
        gameSelect.disabled = false;
        progressContainer.style.display = 'none';
        alert('Fehler beim Laden des Spiels: ' + err.message);
      }
    });

    function loadEngineBundle() {
      console.log('[MAIN] Lade hl2_launcher.js...');
      const s = document.createElement('script');
      s.src = 'hl2_launcher.js';
      s.onload = () => console.log('[MAIN] hl2_launcher.js geladen. Engine gestartet.');
      s.onerror = () => console.error('[MAIN] FEHLER: hl2_launcher.js konnte nicht geladen werden!');
      document.body.appendChild(s);
    }
  </script>
</body>
</html>
