<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#111111">
  <title>Half-Life 2 WebXR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    /* Canvas — nimmt ganzen Viewport */
    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      touch-action: none;
    }

    /* Overlay-UI */
    #overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      background: rgba(0,0,0,0.85);
      z-index: 10;
    }
    #overlay.hidden { display: none; }

    #hl2-logo {
      width: 120px;
      opacity: 0.9;
    }

    /* Game Select */
    #game-select { text-align: center; }
    .game-btn {
      display: block;
      margin: 10px auto;
      width: 380px;
      max-width: 90vw;
      cursor: pointer;
      border-radius: 4px;
      overflow: hidden;
      line-height: 0;
      transition: transform 0.1s ease, box-shadow 0.1s ease;
      border: 2px solid transparent;
    }
    .game-btn:hover {
      transform: scale(1.03);
      border-color: #ff6600;
      box-shadow: 0 0 20px rgba(255,100,0,0.4);
    }
    .game-btn img { display: block; width: 100%; }

    /* Loading */
    #loading {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      display: none;
      z-index: 11;
    }
    #loading.visible { display: block; }
    #status { font-weight: bold; color: #aaa; margin-bottom: 8px; font-size: 14px; }
    #progress {
      width: 300px;
      height: 6px;
      border-radius: 3px;
      background: #333;
      border: none;
      appearance: none;
    }
    #progress::-webkit-progress-bar { background: #333; border-radius: 3px; }
    #progress::-webkit-progress-value { background: #ff6600; border-radius: 3px; }

    /* Spinner */
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid #333;
      border-top-color: #ff6600;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Controls */
    #controls {
      position: fixed;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 20;
    }
    .ctrl-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      backdrop-filter: blur(4px);
    }
    .ctrl-btn:hover { background: rgba(255,255,255,0.2); }

    /* Enter VR Button */
    #enter-vr-btn {
      background: linear-gradient(135deg, #ff6600, #cc4400);
      border: none;
      color: #fff;
      padding: 14px 32px;
      border-radius: 6px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      display: none;
      letter-spacing: 1px;
      box-shadow: 0 4px 20px rgba(255,100,0,0.5);
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #enter-vr-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 28px rgba(255,100,0,0.7);
    }
    #enter-vr-btn.visible { display: block; }

    #xr-status {
      font-size: 12px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Haupt-Canvas (Engine rendert hier) -->
  <canvas id="canvas" oncontextmenu="return false;" tabindex="-1"></canvas>

  <!-- Overlay: Spielauswahl -->
  <div id="overlay">
    <div style="text-align:center; margin-bottom: 10px;">
      <div style="font-size:28px; font-weight:bold; letter-spacing:3px; color:#ff6600;">HALF-LIFE 2</div>
      <div style="font-size:12px; color:#555; margin-top:4px;">WebXR Port — Quest 3</div>
    </div>

    <div id="game-select">
      <div class="game-btn" onclick="pickGame('hl2')">
        <div style="background:#1a1a1a; padding:20px; font-size:16px; color:#ccc;">▶ Half-Life 2</div>
      </div>
      <div class="game-btn" onclick="pickGame('ep1')">
        <div style="background:#1a1a1a; padding:20px; font-size:16px; color:#ccc;">▶ Episode One</div>
      </div>
      <div class="game-btn" onclick="pickGame('ep2')">
        <div style="background:#1a1a1a; padding:20px; font-size:16px; color:#ccc;">▶ Episode Two</div>
      </div>
    </div>

    <button id="enter-vr-btn" onclick="window.xrWrapper && window.xrWrapper.enterVR()">
      🥽 Enter VR
    </button>

    <div id="xr-status">WebXR wird geprüft...</div>
  </div>

  <!-- Loading Indicator -->
  <div id="loading">
    <div class="spinner" id="spinner"></div>
    <div id="status">Lädt...</div>
    <progress id="progress" max="100" value="0" hidden></progress>
  </div>

  <!-- Controls -->
  <div id="controls" style="display:none">
    <button class="ctrl-btn" onclick="document.getElementById('canvas').requestFullscreen()">Fullscreen</button>
    <button class="ctrl-btn" onclick="clearCacheAndReload()">Cache leeren</button>
  </div>

  <script>
    // DOM-Referenzen (auch global für pre.js / post.js)
    window.canvasElement = document.getElementById('canvas');
    window.statusElement = document.getElementById('status');
    window.progressElement = document.getElementById('progress');
    window.spinnerElement = document.getElementById('spinner');

    // Canvas-Größe auf Viewport setzen
    canvasElement.width = window.screen.availWidth;
    canvasElement.height = window.screen.availHeight;

    // Game-Auswahl
    function pickGame(game) {
      try { sessionStorage.setItem('ep', game); } catch(e) {}
      document.getElementById('overlay').classList.add('hidden');
      document.getElementById('loading').classList.add('visible');
      document.getElementById('controls').style.display = 'flex';
      if (Module.__resolveGame) Module.__resolveGame(game);
    }

    // Cache leeren
    async function clearCacheAndReload() {
      try {
        if (window.caches) for (const k of await caches.keys()) await caches.delete(k);
        if (navigator.serviceWorker) {
          const regs = await navigator.serviceWorker.getRegistrations();
          for (const r of regs) await r.unregister();
        }
      } catch(e) {}
      location.reload();
    }

    // WebXR Check
    (async () => {
      const xrStatus = document.getElementById('xr-status');
      const enterVrBtn = document.getElementById('enter-vr-btn');
      if (navigator.xr) {
        try {
          const supported = await navigator.xr.isSessionSupported('immersive-vr');
          if (supported) {
            xrStatus.textContent = '✓ Quest 3 WebXR verfügbar';
            xrStatus.style.color = '#4a4';
            enterVrBtn.classList.add('visible');
          } else {
            xrStatus.textContent = '⚠ WebXR nicht unterstützt — Desktop-Modus';
            xrStatus.style.color = '#a84';
          }
        } catch(e) {
          xrStatus.textContent = '✗ WebXR Fehler: ' + e.message;
          xrStatus.style.color = '#a44';
        }
      } else {
        xrStatus.textContent = '✗ Kein WebXR — verwende Desktop-Modus';
        xrStatus.style.color = '#666';
      }
    })();

    // Service Worker registrieren
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(() => navigator.serviceWorker.ready)
        .then(() => {
          if (!self.crossOriginIsolated) {
            if (!sessionStorage.getItem('__coiReloaded')) {
              sessionStorage.setItem('__coiReloaded', '1');
              location.reload();
            }
          } else {
            sessionStorage.removeItem('__coiReloaded');
          }
        })
        .catch(e => console.warn('SW Registrierung fehlgeschlagen:', e));
    }
  </script>

  <!-- Reihenfolge: pre.js (als inline oder extern) → hl2_launcher.js → xr_wrapper.js -->
  <script src="xr_wrapper.js" defer></script>
  <script src="hl2_launcher.js" async></script>
</body>
</html>
